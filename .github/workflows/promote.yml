name: AI 작업 홍보 콘텐츠 생성

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 00:00 KST (UTC 15:00)
  workflow_dispatch:        # 수동 실행 허용

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # git log 전체 기록 필요

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run promote script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_01 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          mkdir -p scripts/promote/output
          python scripts/promote/summarize_sessions.py \
            --days 1 \
            --output-dir scripts/promote/output

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/promote/output/
          git diff --cached --quiet || git commit -m "chore: auto-generate promote content $(date '+%Y-%m-%d')"
          git push
