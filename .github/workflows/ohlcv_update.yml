name: OHLCV Daily Update

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 15:00 UTC = 00:00 KST
  workflow_dispatch:        # 수동 실행 (테스트용)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 최대 6시간 (초기 전체 수집 대비)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pyarrow \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth

      - name: Run OHLCV Collector
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/ohlcv/collector.py

      - name: Commit status file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ohlcv_status.json
          git diff --staged --quiet || git commit -m "chore: OHLCV 상태 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
