name: 신창환 5전략 — 매일 자동 트레이딩

on:
  schedule:
    # 매일 UTC 00:05 = 한국시간 오전 9:05 (매매법1 완료 후 실행)
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  trading-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설치
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pyupbit

      - name: 트레이딩 사이클 실행
        run: |
          cd scripts/shin_agent
          python run_cycle.py

      - name: 성과 JSON 생성
        run: |
          cd scripts/shin_agent
          python generate_performance.py

      - name: 결과 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SpaceEum Bot"
          git add data/shin_trades.db data/shin_performance.json
          git diff --staged --quiet || git commit -m "⚡ 매매법2 사이클: $(date '+%Y-%m-%d') 09:05 KST"
          git push

      - name: 텔레그램 보고 발송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify.py shin
