name: 매일 자동 스캔 - SpaceEum AI Lab

on:
  schedule:
    # 매일 UTC 00:00 = 한국시간 오전 9:00
    - cron: '0 0 * * *'

  # 수동 실행 (테스트용)
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 스캔 실행 (외부 라이브러리 없음)
      - name: 60일 이평 스캔 실행
        run: python scripts/scan.py

      # 4. 결과 GitHub에 저장
      - name: 스캔 결과 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SpaceEum Bot"
          git add data/scan_latest.json
          git diff --staged --quiet || git commit -m "Auto scan: $(date '+%Y-%m-%d') 09:00 KST"
          git push
