name: 매일 자동 스캔 - SpaceEum AI Lab

on:
  schedule:
    # 매일 UTC 00:00 = 한국시간 오전 9:00
    - cron: '0 0 * * *'

  # 수동 실행 (테스트용)
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설치
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: pyupbit 설치
        run: pip install pyupbit

      - name: 60일 이평 스캔 실행
        run: python scripts/scan.py

      - name: 스캔 결과 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SpaceEum Bot"
          git add data/scan_latest.json data/paper_trades.json data/performance.json
          git diff --staged --quiet || git commit -m "📊 매매법1 스캔: $(date '+%Y-%m-%d') 09:00 KST"
          git pull origin main --rebase
          git push

      - name: 텔레그램 보고 발송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify.py scan
