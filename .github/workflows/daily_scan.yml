name: 매일 자동 스캔 - SpaceEum AI Lab

on:
  schedule:
    # 매일 UTC 00:00 = 한국시간 오전 9:00
    - cron: '0 0 * * *'
  
  # 수동 실행도 가능하게 (테스트용)
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # JSON 파일 저장을 위해 필요
    
    steps:
      # 1. 저장소 코드 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. ccxt 라이브러리 설치
      - name: ccxt 설치
        run: pip install ccxt

      # 4. 스캔 실행
      - name: 60일 이평 스캔 실행
        run: python scripts/scan.py

      # 5. 결과 JSON을 GitHub에 자동 저장
      - name: 스캔 결과 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SpaceEum Bot"
          git add data/scan_latest.json
          git diff --staged --quiet || git commit -m "Auto scan: $(date '+%Y-%m-%d') 09:00 KST"
          git push
